<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT Downloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <rect width="22" height="22" rx="6" fill="#FF2A5F"/>
          <polygon points="9,7 16,11 9,15" fill="white"/>
        </svg>
        <span class="logo-text">YT<span class="logo-accent">down</span></span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="settingsBtn" title="Settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
        <button class="server-btn" id="serverBtn" title="Server Control">
          <div class="status-dot" id="statusDot"></div>
          <span id="serverBtnStatus">Server</span>
        </button>
      </div>
    </header>

    <!-- Video Info -->
    <div class="video-card" id="videoCard">
      <div class="no-video" id="noVideo">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"><path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14v-4z"/><path d="M4 6h8a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V8a2 2 0 012-2z"/></svg>
        <p>Open a YouTube video<br/>to get started</p>
      </div>

      <div class="video-info" id="videoInfo" style="display:none">
        <div class="thumb-wrap">
          <img id="videoThumb" src="" alt="" class="thumb" />
          <div class="thumb-overlay">
            <div class="meta">
              <p class="video-title" id="videoTitle">—</p>
              <div class="meta-row">
                <p class="video-channel" id="videoChannel">—</p>
                <div class="duration-badge" id="videoDuration"></div>
              </div>
            </div>
            <button id="thumbDownloadBtn" class="thumb-dl-btn" title="Download Thumbnail">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Playlist Banner -->
    <div class="playlist-banner" id="playlistBanner" style="display:none">
      <div class="playlist-info">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
        <span>Playlist Detected</span>
      </div>
      <button id="downloadPlaylistBtn" class="playlist-dl-btn">Get All</button>
    </div>

    <!-- Controls Area -->
    <div class="section" id="formatSection" style="display:none">
      
      <!-- Segmented Control -->
      <div class="segmented-control">
        <button class="segment-btn active" data-type="video">Video</button>
        <button class="segment-btn" data-type="audio">Audio</button>
        <button class="segment-btn" data-type="subs">Subtitles</button>
      </div>

      <!-- Quality Grids -->
      <div class="quality-grid" id="videoQualities">
        <button class="quality-btn active" data-quality="1080">1080p</button>
        <button class="quality-btn" data-quality="720">720p</button>
        <button class="quality-btn" data-quality="480">480p</button>
        <button class="quality-btn" data-quality="360">360p</button>
      </div>

      <div class="quality-grid" id="audioQualities" style="display:none">
        <button class="quality-btn active" data-quality="320">320kbps</button>
        <button class="quality-btn" data-quality="256">256kbps</button>
        <button class="quality-btn" data-quality="128">128kbps</button>
      </div>

      <div class="quality-grid" id="subtitleQualities" style="display:none">
        <p class="empty-msg">Scanning for CC…</p>
      </div>

      <!-- Advanced Toggle -->
      <button class="advanced-toggle" id="advancedToggleBtn" style="display:none">
        Advanced Options <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </button>

      <!-- Advanced Options (Trim / Lyrics) -->
      <div class="advanced-options" id="advancedOptions" style="display:none">
        <div class="trimmer-wrap" id="trimmerWrap">
          <label>✂️ Trim Clip</label>
          <div class="trimmer-inputs">
            <input type="text" id="trimStart" placeholder="00:00:00" />
            <span class="trim-sep">to</span>
            <input type="text" id="trimEnd" placeholder="00:00:00" />
          </div>
        </div>
        <div class="lyrics-wrap" id="lyricsWrap">
          <label class="checkbox-label">
            <input type="checkbox" id="embedLyrics" />
            <span class="custom-checkbox"></span>
            Embed Lyrics (LRCLIB)
          </label>
        </div>
      </div>
    </div>

    <!-- Download Button -->
    <button class="download-btn" id="downloadBtn" disabled>
      <span class="btn-label" id="btnLabel">Detecting video…</span>
      <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
    </button>

    <!-- Queue Section -->
    <div class="queue-section" id="queueSection" style="display:none">
      <div class="section-label">Queue</div>
      <div class="queue-list" id="queueList"></div>
    </div>

    <!-- History -->
    <div class="history-section" id="historySection">
      <div class="history-header">
        <p class="section-label">Recent</p>
        <button class="clear-btn" id="clearHistory">Clear</button>
      </div>
      <div id="historyList" class="history-list"></div>
    </div>

  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal" style="display:none">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Preferences</h2>
        <button id="closeSettings" class="icon-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
      </div>
      <div class="modal-body">
        <div class="input-group">
          <label for="downloadDirInput">Download Directory</label>
          <input type="text" id="downloadDirInput" placeholder="C:\Users\Name\Downloads" />
        </div>
        <button id="saveSettings" class="btn-primary">Save Settings</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
